[agent]
  ## How often to gather metrics
  interval = "1s"
  ## Round to nearest interval
  round_interval = true
  ## Max metrics per batch
  metric_batch_size = 100
  ## Max metrics to buffer
  metric_buffer_limit = 1000
  ## Flush interval — match collection interval to avoid data loss on crash
  flush_interval = "1s"
  ## Quiet mode
  quiet = true
  debug = false


[[outputs.file]]
  files = ["/home/radxa/logs/flight_telemetry/metrics.csv"]
  data_format = "csv"


#  CPU
[[inputs.cpu]]
  percpu    = true
  totalcpu  = true
  collect_cpu_time = false


#  Memory
[[inputs.mem]]
  # Only keep the fields that are actually useful — drops ~28 unused columns
  fieldpass = ["used_percent", "available_percent", "available",
               "used", "total", "buffered", "cached"]


#  Network stats
[[inputs.net]]
  interfaces = ["wlan0"]


#  Network latency (ping)
[[inputs.ping]]
  urls     = ["192.168.1.1"]
  count    = 4          # was 1 → packet loss now 0/25/50/75/100% instead of 0/100%
  interval = 5.0
  timeout  = 1.0


#  WiFi signal strength (RSSI)
# Gives actual RF link quality, not just latency
[[inputs.exec]]
  commands     = ["sh -c \"iwconfig wlan0 | grep -oP 'Signal level=\\K[-0-9]+'\""]
  name_override = "wifi_rssi"
  data_format  = "value"
  data_type    = "integer"
  timeout      = "1s"


#  System load average
[[inputs.system]]
  fieldpass = ["load1", "load5", "load15", "n_cpus"]


#  CPU temperature
# Raw value is in millidegrees — divide by 1000 to get °C when plotting
# Detects thermal throttling that won't show up in CPU usage %
[[inputs.file]]
  files         = ["/sys/class/thermal/thermal_zone0/temp"]
  name_override = "cpu_temp"
  data_format   = "value"
  data_type     = "integer"


#  CPU frequency scaling
# Catches silent throttling under thermal/power constraints
# (usage % can look normal while the core is running at half speed)
[[inputs.exec]]
  commands     = ["cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"]
  name_override = "cpu_cur_freq"
  data_format  = "value"
  data_type    = "integer"
  timeout      = "1s"


#  GPU — current frequency
[[inputs.exec]]
  commands = [
    "cat /sys/devices/platform/soc/ffe40000.gpu/devfreq/ffe40000.gpu/cur_freq"
  ]
  name_override = "gpu_cur_freq"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"


#  GPU — max frequency
[[inputs.exec]]
  commands = [
    "cat /sys/devices/platform/soc/ffe40000.gpu/devfreq/ffe40000.gpu/max_freq"
  ]
  name_override = "gpu_max_freq"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"


