[agent]
  ## How often to gather metrics
  interval = "1s"
  ## Round to nearest interval
  round_interval = true
  ## Max metrics per batch
  metric_batch_size = 100
  ## Max metrics to buffer
  metric_buffer_limit = 1000
  ## Flush interval — match collection interval to avoid data loss on crash
  flush_interval = "1s"
  ## Quiet mode
  quiet = true
  debug = false


[[outputs.file]]
  files = ["/home/radxa/logs/flight_telemetry/metrics.csv"]
  data_format = "csv"


#  CPU
[[inputs.cpu]]
  percpu           = true
  totalcpu         = true
  collect_cpu_time = false


#  Memory
# fieldinclude trims ~28 unused columns from the default mem output
[[inputs.mem]]
  fieldinclude = ["used_percent", "available_percent", "available",
                  "used", "total", "buffered", "cached"]


#  Network stats
[[inputs.net]]
  interfaces = ["wlan0"]


#  Network latency (ping)
# count=4 gives meaningful packet loss steps (0/25/50/75/100%)
[[inputs.ping]]
  urls     = ["192.168.1.1"]
  count    = 4
  interval = 5.0
  timeout  = 1.0


#  WiFi signal strength (RSSI)
# RF link quality in dBm — more meaningful than ping latency alone
# Uses 'iw' (modern replacement for deprecated iwconfig)
[[inputs.exec]]
  commands      = ["sh -c \"iw dev wlan0 link | grep -oP 'signal: \\K[-0-9]+'\""]
  name_override = "wifi_rssi"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"


#  System load average
[[inputs.system]]
  fieldinclude = ["load1", "load5", "load15", "n_cpus"]


#  CPU temperature
# Raw millidegrees — divide by 1000 for °C when plotting
# Detects thermal throttling that won't appear in CPU usage %
[[inputs.file]]
  files         = ["/sys/class/thermal/thermal_zone0/temp"]
  name_override = "cpu_temp"
  data_format   = "value"
  data_type     = "integer"


#  DDR temperature
# Found via: cat /sys/class/hwmon/hwmon*/name → ddr_thermal
# Verify the hwmon number on your board:
#   grep -rl "ddr_thermal" /sys/class/hwmon/
# Then replace hwmon1 below with the correct number
[[inputs.file]]
  files         = ["/sys/class/hwmon/hwmon1/temp1_input"]
  name_override = "ddr_temp"
  data_format   = "value"
  data_type     = "integer"


#  CPU frequency scaling
# Catches silent throttling — usage % can look normal while
# the core is running at half speed due to thermal/power limits
[[inputs.exec]]
  commands      = ["cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"]
  name_override = "cpu_cur_freq"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"


#  GPU — current frequency
# What the hardware clock is actually running at
[[inputs.exec]]
  commands      = ["cat /sys/devices/platform/soc/ffe40000.gpu/devfreq/ffe40000.gpu/cur_freq"]
  name_override = "gpu_cur_freq"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"


#  GPU — target frequency
# What the governor *requested* based on measured load — better load proxy
# than cur_freq because it reflects the governor's decision before hardware
# constraints clip it. Compare with cur_freq to detect voltage/thermal limits.
[[inputs.exec]]
  commands      = ["cat /sys/devices/platform/soc/ffe40000.gpu/devfreq/ffe40000.gpu/target_freq"]
  name_override = "gpu_target_freq"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"


#  GPU — min / max frequency
# Static hardware limits — logged for reference and ratio calculation.
# min_freq is the idle baseline used by the gpu_utilisation script.
[[inputs.exec]]
  commands      = ["cat /sys/devices/platform/soc/ffe40000.gpu/devfreq/ffe40000.gpu/min_freq"]
  name_override = "gpu_min_freq"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"

[[inputs.exec]]
  commands      = ["cat /sys/devices/platform/soc/ffe40000.gpu/devfreq/ffe40000.gpu/max_freq"]
  name_override = "gpu_max_freq"
  data_format   = "value"
  data_type     = "integer"
  timeout       = "1s"


# NOTE: GPU utilisation is not directly available via sysfs on this platform, but can be computed from frequency deltas if the driver provides the right data. The script gpu_utilisation.sh does this by reading busy_time and total_time from sysfs, computing their deltas between runs, and calculating utilisation as (busy_time_delta / total_time_delta) * 100. This gives a more accurate picture of GPU load than frequency alone, which can be affected by thermal/power limits.
#  GPU — utilisation % (via trans_stat delta)
# No 'utilisation' sysfs node on this kernel (Mali-G52, Panfrost driver).
# Script reads min_freq dynamically from sysfs and computes:
#   busy_time_delta / total_time_delta * 100
# Deploy: cp gpu_utilisation.sh /home/radxa/ && chmod +x /home/radxa/gpu_utilisation.sh
# [[inputs.exec]]
#   commands      = ["/home/radxa/edge_robot_telemetry/gpu_utilisation.sh"]
#   name_override = "gpu_utilisation"
#   data_format   = "value"
#   data_type     = "integer"
#   timeout       = "2s"
